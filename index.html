<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map of Book · Effi Briest Explorer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <header>
        <h1>Map of Book</h1>
        <p>
          Interactive chapter map for <em>Effi Briest</em>. Click phases and chapters
          to open persistent info cards. Click glossary terms to open nested tooltips,
          then use chapter highlighting and close controls to navigate.
        </p>
      </header>

      <section id="info-grid" class="info-grid" aria-label="Main infoboxes"></section>

      <div class="toolbar">
        <button id="close-all-tooltips" type="button">Close all tooltips</button>
      </div>

      <section class="viz-card">
        <div id="timeline" class="timeline" aria-live="polite">
          <div id="phase-rows" class="phase-rows"></div>
        </div>
      </section>

      <section id="popup-layer" class="popup-layer" aria-live="polite"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
