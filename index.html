<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map of Book · Script Explorer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app-root" class="layout">
      <section id="home-page" class="home-page">
        <header class="top-header">
          <h1>Map of Book</h1>
          <p class="home-intro">Choose a script to open its chapter visualizer.</p>
        </header>
        <div id="script-cards" class="script-cards" aria-label="Available scripts"></div>
      </section>

      <section id="visualizer-page" class="visualizer-page" hidden>
        <header class="top-header">
          <div class="title-row">
            <div class="title-controls">
              <h1>Map of Book <button id="title-help" class="title-help" type="button" aria-label="About this view">(?)</button></h1>
              <button id="home-button" class="home-button" type="button">All scripts</button>
              <label class="book-select-label" for="book-select">Script</label>
              <select id="book-select" class="book-select" aria-label="Choose a book script"></select>
            </div>
          </div>
        </header>

        <section class="split-layout" aria-label="Chapter map and tooltips">
          <div id="main-viewport" class="main-viewport">
            <section id="info-grid" class="info-grid" aria-label="Main infoboxes"></section>
            <section class="viz-card">
              <div class="viz-layout">
                <div id="timeline" class="timeline" aria-live="polite">
                  <div id="phase-rows" class="phase-rows"></div>
                </div>
              </div>
            </section>
          </div>

          <button id="splitter-handle" class="splitter-handle" type="button" aria-label="Resize tooltips panel" aria-orientation="horizontal"></button>

          <div id="tooltip-viewport" class="tooltip-viewport" aria-live="polite">
            <div class="tooltip-toolbar">
              <button id="close-all-tooltips" type="button">Close all tooltips</button>
            </div>
            <section id="popup-layer" class="popup-layer"></section>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
