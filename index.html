<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map of Book · Effi Briest Explorer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="top-header">
        <div class="title-row">
          <h1>Map of Book <button id="title-help" class="title-help" type="button" aria-label="About this view">(?)</button></h1>
          <button id="close-all-tooltips" type="button">Close all tooltips</button>
        </div>
      </header>

      <section id="popup-layer" class="popup-layer" aria-live="polite"></section>

      <section id="info-grid" class="info-grid" aria-label="Main infoboxes"></section>

      <section class="viz-card">
        <div class="viz-layout">
          <div id="timeline" class="timeline" aria-live="polite">
            <div id="phase-rows" class="phase-rows"></div>
          </div>
          <aside class="legend" aria-label="Chapter category legend">
            <h3>Chapter colors</h3>
            <ul>
              <li><span class="legend-swatch legend-exp"></span> Exposition (Exp)</li>
              <li><span class="legend-swatch legend-comp"></span> Complication (Comp)</li>
              <li><span class="legend-swatch legend-int"></span> Introspection (Int)</li>
              <li><span class="legend-swatch legend-turn"></span> Turning point (Turn)</li>
              <li><span class="legend-swatch legend-res"></span> Resolution (Res)</li>
              <li><span class="legend-swatch legend-dig"></span> Digression (Dig)</li>
            </ul>
          </aside>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
