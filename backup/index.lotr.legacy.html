<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map of Book · Character Arc Explorer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <header>
        <h1>Map of Book</h1>
        <p>
          Explore chapter importance for each character group in <em>The Lord of
          the Rings</em>. Books are arranged vertically and chapters horizontally.
          Each rectangle's area tracks presence + development, split into
          colored fractions for each metric. Hover for details.
        </p>
      </header>

      <section class="controls" aria-label="Character selector">
        <label for="character-select">Focus character</label>
        <select id="character-select"></select>
      </section>

      <section class="viz-card">
        <div id="timeline" class="timeline" aria-live="polite"></div>
      </section>
      <div id="tooltip" class="tooltip" hidden></div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
